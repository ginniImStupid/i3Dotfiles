[general]
import = ["~/.config/alacritty/gruvbox.toml"]

[env]
TERM = "alacritty"

[window]
padding = {x = 10,y = 10}
dynamic_title = true

[font]
normal = {family = "Iosevka Nerd Font", style = "Regular"}
bold = {family = "Iosevka Nerd Font", style = "Bold"}
italic = {family = "Iosevka Nerd Font", style = "Italic"}
size = 10

[cursor]
style = {shape = "Beam", blinking = "On"}
